<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspree AJAX - Script Tag Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      background: #f5576c;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #f5576c;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .note {
      margin-top: 20px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }

    .note strong {
      color: #333;
    }

    .note code {
      background: #e9ecef;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 11px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #f5576c;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; ESM Demo</a>

    <h1>Newsletter Signup <span class="badge">Script Tag</span></h1>
    <p class="subtitle">Using <code>window.formspree</code> global API &mdash; no bundler required</p>

    <div data-fs-message></div>

    <form id="newsletter-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your name"
          data-fs-field="name"
        >
        <span data-fs-error="name"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your.email@example.com"
          data-fs-field="email"
        >
        <span data-fs-error="email"></span>
      </div>

      <div class="form-group">
        <label for="message">Message (optional)</label>
        <textarea
          id="message"
          name="message"
          placeholder="Anything you'd like to share..."
          data-fs-field="message"
        ></textarea>
        <span data-fs-error="message"></span>
      </div>

      <button type="submit" data-fs-submit-btn>
        Subscribe
      </button>
    </form>

    <div class="note">
      <strong>How it works:</strong> Load <code>global.js</code> via a script tag.
      It sets up <code>window.formspree()</code>, then call it to initialize your form.
      No bundler needed!
    </div>
  </div>

  <!--
    Production usage:

    <script src="https://unpkg.com/@formspree/ajax@1/dist/global.js"></script>
    <script>
      formspree('form', '#newsletter-form', { formId: 'YOUR_FORM_ID' });
    </script>

    In this Vite demo, global.js is loaded via a module entry that aliases to the source.
  -->

  <!-- Step 1: Load the library -->
  <script type="module" src="/global-entry.ts"></script>

  <!-- Step 2: Initialize the form -->
  <script type="module">
    formspree('form', '#newsletter-form', {
      formId: 'meekngvn',
      debug: true,
      fields: {
        name: { prettyName: 'Name' },
        email: {
          prettyName: 'Email',
          errorMessages: {
            typeEmail: 'Please enter a valid email',
            requiredFieldEmpty: 'Email is required',
          },
        },
      },
    });
  </script>
</body>
</html>
