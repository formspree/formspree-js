<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspree AJAX Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(14, 35, 45, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #0e232d;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #4a6572;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #0e232d;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #e5122e;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #e5122e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #dc2626;
      box-shadow: 0 10px 20px rgba(229, 18, 46, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .note {
      margin-top: 20px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      color: #4a6572;
    }

    .note strong {
      color: #0e232d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Form</h1>
    <p class="subtitle">Pure JavaScript AJAX form powered by Formspree</p>

    <div data-fs-success></div>
    <div data-fs-error></div>

    <form id="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your name"
          data-fs-field
        >
        <span class="field-error" data-fs-error="name"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your.email@example.com"
          data-fs-field
        >
        <span class="field-error" data-fs-error="email"></span>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea
          id="message-field"
          name="message"
          placeholder="Write your message here..."
          data-fs-field
        ></textarea>
        <span class="field-error" data-fs-error="message"></span>
      </div>

      <button type="submit" id="submit-btn" data-fs-submit-btn>
        Send Message
      </button>
    </form>

    <div class="note">
      <strong>Note:</strong> Set <code>VITE_FORMSPREE_FORM_ID</code> in <code>.env.local</code> or replace <code>YOUR_FORM_ID</code> in <code>main.ts</code> with your actual Formspree form ID.
      <br><br>
      <a href="/global.html">See the Script Tag demo &rarr;</a>
    </div>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
